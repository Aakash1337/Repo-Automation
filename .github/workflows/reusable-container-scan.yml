name: Reusable Container Scan

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      ref:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      build_context:
        required: true
        type: string
      image_name:
        required: true
        type: string
      policy_mode:
        required: true
        type: string
      severity_threshold:
        required: true
        type: string
      ignore_unfixed:
        required: true
        type: boolean
      runner_label:
        required: false
        default: ubuntu-latest
        type: string
      docker_builder_mode:
        required: false
        default: docker-buildx
        type: string
      tooling_mode:
        required: false
        default: bootstrap
        type: string
      docker_cache_mode:
        required: false
        default: gha
        type: string
      docker_local_cache_dir:
        required: false
        default: /var/lib/repo-scanner/buildx-cache
        type: string
      allowlist_cves:
        required: false
        default: "[]"
        type: string
      skip_secret_scan:
        required: false
        default: false
        type: boolean
      skip_build:
        required: false
        default: false
        type: boolean
    outputs:
      policy_result:
        description: "pass, warn, or fail"
        value: ${{ jobs.scan.outputs.policy_result }}
      critical_count:
        description: "Critical vulnerability count"
        value: ${{ jobs.scan.outputs.critical_count }}
      high_count:
        description: "High vulnerability count"
        value: ${{ jobs.scan.outputs.high_count }}
      artifact_bundle_name:
        description: "Uploaded scan artifact bundle"
        value: ${{ jobs.scan.outputs.artifact_bundle_name }}
  workflow_dispatch:
    inputs:
      repository:
        description: "GitHub repository in owner/name form"
        required: true
        type: string
      ref:
        description: "Git ref to scan"
        required: true
        default: "main"
        type: string
      dockerfile_path:
        description: "Dockerfile path in the target repository"
        required: true
        default: "Dockerfile"
        type: string
      build_context:
        description: "Docker build context"
        required: true
        default: "."
        type: string
      image_name:
        description: "Temporary local image name"
        required: true
        default: "localscan/example:root"
        type: string
      policy_mode:
        description: "advisory or enforce"
        required: true
        default: "advisory"
        type: choice
        options:
          - advisory
          - enforce
      severity_threshold:
        description: "Severity threshold for policy enforcement"
        required: true
        default: "critical"
        type: choice
        options:
          - low
          - medium
          - high
          - critical
      ignore_unfixed:
        description: "Only enforce on fixable CVEs"
        required: true
        default: true
        type: boolean
      runner_label:
        description: "Runner label for this job"
        required: false
        default: "ubuntu-latest"
        type: string
      docker_builder_mode:
        description: "blacksmith or docker-buildx"
        required: false
        default: "docker-buildx"
        type: choice
        options:
          - docker-buildx
          - blacksmith
      tooling_mode:
        description: "bootstrap or preinstalled"
        required: false
        default: "bootstrap"
        type: choice
        options:
          - bootstrap
          - preinstalled
      docker_cache_mode:
        description: "gha or local"
        required: false
        default: "gha"
        type: choice
        options:
          - gha
          - local
      docker_local_cache_dir:
        description: "Path for local buildx cache on self-hosted runners"
        required: false
        default: "/var/lib/repo-scanner/buildx-cache"
        type: string
      allowlist_cves:
        description: "JSON array of CVE IDs to suppress"
        required: false
        default: "[]"
        type: string
      skip_secret_scan:
        description: "Skip gitleaks"
        required: false
        default: false
        type: boolean
      skip_build:
        description: "Skip docker build and image scan"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  scan:
    runs-on: ${{ inputs.runner_label || github.event.inputs.runner_label || 'ubuntu-latest' }}
    timeout-minutes: 30
    outputs:
      policy_result: ${{ steps.outputs.outputs.policy_result }}
      critical_count: ${{ steps.outputs.outputs.critical_count }}
      high_count: ${{ steps.outputs.outputs.high_count }}
      artifact_bundle_name: ${{ steps.naming.outputs.artifact_bundle_name }}
    steps:
      - name: Checkout control plane
        uses: actions/checkout@v4
        with:
          path: control-plane

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ORG_SCAN_APP_ID }}
          private-key: ${{ secrets.ORG_SCAN_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.event.inputs.repository }}
          ref: ${{ inputs.ref || github.event.inputs.ref }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control-plane/requirements.txt

      - name: Install Python dependencies
        run: pip install -r control-plane/requirements.txt

      - name: Resolve runtime settings
        id: runtime
        env:
          DOCKER_BUILDER_MODE: ${{ inputs.docker_builder_mode || github.event.inputs.docker_builder_mode || 'docker-buildx' }}
          TOOLING_MODE: ${{ inputs.tooling_mode || github.event.inputs.tooling_mode || 'bootstrap' }}
          DOCKER_CACHE_MODE: ${{ inputs.docker_cache_mode || github.event.inputs.docker_cache_mode || 'gha' }}
          DOCKER_LOCAL_CACHE_DIR: ${{ inputs.docker_local_cache_dir || github.event.inputs.docker_local_cache_dir || '/var/lib/repo-scanner/buildx-cache' }}
        run: |
          if [ "$DOCKER_BUILDER_MODE" = "blacksmith" ]; then
            echo "cache_from=" >> "$GITHUB_OUTPUT"
            echo "cache_to=" >> "$GITHUB_OUTPUT"
          elif [ "$DOCKER_CACHE_MODE" = "local" ]; then
            echo "cache_from=type=local,src=${DOCKER_LOCAL_CACHE_DIR}" >> "$GITHUB_OUTPUT"
            echo "cache_to=type=local,dest=${DOCKER_LOCAL_CACHE_DIR},mode=max" >> "$GITHUB_OUTPUT"
          else
            echo "cache_from=type=gha" >> "$GITHUB_OUTPUT"
            echo "cache_to=type=gha,mode=max" >> "$GITHUB_OUTPUT"
          fi
          echo "tooling_mode=${TOOLING_MODE}" >> "$GITHUB_OUTPUT"
          echo "docker_builder_mode=${DOCKER_BUILDER_MODE}" >> "$GITHUB_OUTPUT"
          echo "docker_cache_mode=${DOCKER_CACHE_MODE}" >> "$GITHUB_OUTPUT"
          echo "docker_local_cache_dir=${DOCKER_LOCAL_CACHE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Install security tooling
        if: ${{ steps.runtime.outputs.tooling_mode != 'preinstalled' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -sSfL https://raw.githubusercontent.com/hadolint/hadolint/master/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Set up Trivy
        if: ${{ steps.runtime.outputs.tooling_mode != 'preinstalled' }}
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Install Syft
        if: ${{ steps.runtime.outputs.tooling_mode != 'preinstalled' }}
        uses: anchore/sbom-action/download-syft@v0.17.7

      - name: Install Cosign
        if: ${{ steps.runtime.outputs.tooling_mode != 'preinstalled' }}
        uses: sigstore/cosign-installer@v3.7.0

      - name: Verify preinstalled security tooling
        if: ${{ steps.runtime.outputs.tooling_mode == 'preinstalled' }}
        run: |
          command -v jq
          command -v hadolint
          command -v gitleaks
          command -v trivy
          command -v syft
          command -v cosign
          docker buildx version

      - name: Prepare local Buildx cache directory
        if: ${{ !(inputs.skip_build || github.event.inputs.skip_build == 'true') && steps.runtime.outputs.docker_builder_mode != 'blacksmith' && steps.runtime.outputs.docker_cache_mode == 'local' }}
        run: |
          sudo mkdir -p "${{ steps.runtime.outputs.docker_local_cache_dir }}"
          sudo chown "$(id -u):$(id -g)" "${{ steps.runtime.outputs.docker_local_cache_dir }}"

      - name: Set up Docker builder
        if: ${{ !(inputs.skip_build || github.event.inputs.skip_build == 'true') && steps.runtime.outputs.docker_builder_mode == 'blacksmith' }}
        uses: useblacksmith/setup-docker-builder@v1

      - name: Set up Docker Buildx
        if: ${{ !(inputs.skip_build || github.event.inputs.skip_build == 'true') && steps.runtime.outputs.docker_builder_mode != 'blacksmith' }}
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: |
            network=host
          keep-state: ${{ steps.runtime.outputs.docker_cache_mode == 'local' }}

      - name: Log in to private registry
        if: ${{ !(inputs.skip_build || github.event.inputs.skip_build == 'true') && vars.REGISTRY_HOST != '' && secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Resolve artifact naming
        id: naming
        env:
          REPOSITORY: ${{ inputs.repository || github.event.inputs.repository }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path || github.event.inputs.dockerfile_path }}
        run: |
          SAFE_REPO=$(echo "$REPOSITORY" | tr '/[:upper:]' '-[:lower:]')
          SAFE_DOCKERFILE=$(echo "$DOCKERFILE_PATH" | tr '/[:upper:]' '-[:lower:]')
          ARTIFACT_BUNDLE_NAME="scan-summary-${SAFE_REPO}-${SAFE_DOCKERFILE}"
          echo "artifact_bundle_name=${ARTIFACT_BUNDLE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare output directories
        run: |
          mkdir -p output/raw output/final

      - name: Run Hadolint
        continue-on-error: true
        working-directory: target-repo
        env:
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path || github.event.inputs.dockerfile_path }}
        run: |
          hadolint -f json "$DOCKERFILE_PATH" > ../output/raw/hadolint.json

      - name: Run Trivy config scan
        continue-on-error: true
        working-directory: target-repo
        run: |
          trivy config . \
            --scanners misconfig \
            --format json \
            --output ../output/raw/trivy-config.json
          trivy config . \
            --scanners misconfig \
            --format sarif \
            --output ../output/raw/trivy-config.sarif

      - name: Build local scan image
        id: build
        if: ${{ !(inputs.skip_build || github.event.inputs.skip_build == 'true') && steps.runtime.outputs.docker_builder_mode == 'blacksmith' }}
        continue-on-error: true
        uses: useblacksmith/build-push-action@v2
        with:
          context: target-repo/${{ inputs.build_context || github.event.inputs.build_context }}
          file: target-repo/${{ inputs.dockerfile_path || github.event.inputs.dockerfile_path }}
          push: false
          load: true
          tags: ${{ inputs.image_name || github.event.inputs.image_name }}

      - name: Build local scan image with Docker Buildx
        id: build-standard
        if: ${{ !(inputs.skip_build || github.event.inputs.skip_build == 'true') && steps.runtime.outputs.docker_builder_mode != 'blacksmith' }}
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: target-repo/${{ inputs.build_context || github.event.inputs.build_context }}
          file: target-repo/${{ inputs.dockerfile_path || github.event.inputs.dockerfile_path }}
          push: false
          load: true
          tags: ${{ inputs.image_name || github.event.inputs.image_name }}
          cache-from: ${{ steps.runtime.outputs.cache_from }}
          cache-to: ${{ steps.runtime.outputs.cache_to }}

      - name: Mark build status
        id: build-status
        env:
          SKIP_BUILD: ${{ inputs.skip_build || github.event.inputs.skip_build }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          BUILD_STANDARD_OUTCOME: ${{ steps.build-standard.outcome }}
        run: |
          if [ "$SKIP_BUILD" = "true" ]; then
            echo "value=skipped" >> "$GITHUB_OUTPUT"
          elif [ "$BUILD_OUTCOME" = "success" ] || [ "$BUILD_STANDARD_OUTCOME" = "success" ]; then
            echo "value=built" >> "$GITHUB_OUTPUT"
          else
            echo "value=build_failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SBOM
        if: ${{ steps.build-status.outputs.value == 'built' }}
        run: |
          syft "${{ inputs.image_name || github.event.inputs.image_name }}" -o cyclonedx-json=output/final/sbom.cdx.json

      - name: Run Trivy image scan
        if: ${{ steps.build-status.outputs.value == 'built' }}
        continue-on-error: true
        run: |
          trivy image \
            --format json \
            --output output/raw/trivy-image.json \
            "${{ inputs.image_name || github.event.inputs.image_name }}"
          trivy image \
            --format sarif \
            --output output/raw/trivy-image.sarif \
            "${{ inputs.image_name || github.event.inputs.image_name }}"

      - name: Run Gitleaks
        if: ${{ !(inputs.skip_secret_scan || github.event.inputs.skip_secret_scan == 'true') }}
        continue-on-error: true
        working-directory: target-repo
        run: |
          gitleaks detect --no-git --source . --report-format json --report-path ../output/raw/gitleaks.json

      - name: Create empty fallback files
        run: |
          [ -f output/raw/hadolint.json ] || echo "[]" > output/raw/hadolint.json
          [ -f output/raw/trivy-config.json ] || echo "{}" > output/raw/trivy-config.json
          [ -f output/raw/trivy-image.json ] || echo "{}" > output/raw/trivy-image.json
          [ -f output/raw/gitleaks.json ] || echo "[]" > output/raw/gitleaks.json
          [ -f output/raw/trivy-config.sarif ] || echo '{"version":"2.1.0","runs":[]}' > output/raw/trivy-config.sarif
          [ -f output/raw/trivy-image.sarif ] || echo '{"version":"2.1.0","runs":[]}' > output/raw/trivy-image.sarif

      - name: Normalize results
        env:
          REPOSITORY: ${{ inputs.repository || github.event.inputs.repository }}
          REF: ${{ inputs.ref || github.event.inputs.ref }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile_path || github.event.inputs.dockerfile_path }}
          IMAGE_NAME: ${{ inputs.image_name || github.event.inputs.image_name }}
          POLICY_MODE: ${{ inputs.policy_mode || github.event.inputs.policy_mode }}
          SEVERITY_THRESHOLD: ${{ inputs.severity_threshold || github.event.inputs.severity_threshold }}
          IGNORE_UNFIXED: ${{ inputs.ignore_unfixed || github.event.inputs.ignore_unfixed }}
          BUILD_STATUS: ${{ steps.build-status.outputs.value }}
          ARTIFACT_BUNDLE_NAME: ${{ steps.naming.outputs.artifact_bundle_name }}
          ALLOWLIST_CVES: ${{ inputs.allowlist_cves || github.event.inputs.allowlist_cves || '[]' }}
        run: |
          python control-plane/scripts/normalize_results.py scan-summary \
            --repository "$REPOSITORY" \
            --ref "$REF" \
            --dockerfile-path "$DOCKERFILE_PATH" \
            --image-name "$IMAGE_NAME" \
            --policy-mode "$POLICY_MODE" \
            --severity-threshold "$SEVERITY_THRESHOLD" \
            --ignore-unfixed "$IGNORE_UNFIXED" \
            --build-status "$BUILD_STATUS" \
            --artifact-bundle-name "$ARTIFACT_BUNDLE_NAME" \
            --allowlist-cves "$ALLOWLIST_CVES" \
            --hadolint output/raw/hadolint.json \
            --trivy-image output/raw/trivy-image.json \
            --trivy-config output/raw/trivy-config.json \
            --gitleaks output/raw/gitleaks.json \
            --sbom output/final/sbom.cdx.json \
            --output output/final/scan-summary.json \
            --markdown-output output/final/scan-summary.md
          cat output/final/scan-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy config SARIF
        if: ${{ hashFiles('output/raw/trivy-config.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: output/raw/trivy-config.sarif
          category: trivy-config/${{ inputs.repository || github.event.inputs.repository }}

      - name: Upload Trivy image SARIF
        if: ${{ hashFiles('output/raw/trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: output/raw/trivy-image.sarif
          category: trivy-image/${{ inputs.repository || github.event.inputs.repository }}

      - name: Upload scan artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.naming.outputs.artifact_bundle_name }}
          path: |
            output/raw/hadolint.json
            output/raw/trivy-config.json
            output/raw/trivy-image.json
            output/raw/gitleaks.json
            output/raw/trivy-config.sarif
            output/raw/trivy-image.sarif
            output/final/sbom.cdx.json
            output/final/scan-summary.json
            output/final/scan-summary.md
          retention-days: 14

      - name: Publish reusable workflow outputs
        id: outputs
        run: |
          python - <<'PY'
          import json
          import os
          with open("output/final/scan-summary.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"policy_result={payload['policy_result']}\n")
              handle.write(f"critical_count={payload['vuln_counts'].get('critical', 0)}\n")
              handle.write(f"high_count={payload['vuln_counts'].get('high', 0)}\n")
          PY

      - name: Enforce policy gate
        if: ${{ (inputs.policy_mode || github.event.inputs.policy_mode) == 'enforce' }}
        run: |
          RESULT=$(python - <<'PY'
          import json
          with open("output/final/scan-summary.json", "r", encoding="utf-8") as handle:
              print(json.load(handle)["policy_result"])
          PY
          )
          if [ "$RESULT" = "fail" ]; then
            echo "Policy enforcement failed"
            exit 1
          fi
